<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Shape Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "EB Garamond", "Georgia", serif;
      background: #fafaf8;
      color: #111;
      padding: 40px 32px;
    }
    .label {
      font-family: -apple-system, sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #999;
      margin-bottom: 20px;
    }
    .label span {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-left: 8px;
      letter-spacing: 0.05em;
    }
    .option {
      margin-bottom: 56px;
      padding-bottom: 56px;
      border-bottom: 1px solid #e0e0db;
    }
    .option:last-child { border-bottom: none; }
    .photo { overflow: hidden; margin-bottom: 20px; }
    .photo img { width: 100%; height: 100%; object-fit: cover; }
    .photo.square { width: 120px; height: 120px; border-radius: 0; }
    .photo.rect { width: 140px; height: 100px; border-radius: 0; }
    h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.72rem;
      color: #636363;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="option">
    <div class="label">Option A — Square <span>clean · editorial</span></div>
    <div class="photo square">
      <img src="IMG_20220616_074704_679.jpg" alt="photo" />
    </div>
    <h1>Iliya Sabzevari, Ph.D.</h1>
    <p class="eyebrow">Computational Scientist</p>
  </div>

  <div class="option">
    <div class="label">Option B — Rectangle (landscape) <span>wide · magazine</span></div>
    <div class="photo rect">
      <img src="IMG_20220616_074704_679.jpg" alt="photo" />
    </div>
    <h1>Iliya Sabzevari, Ph.D.</h1>
    <p class="eyebrow">Computational Scientist</p>
  </div>
</body>
</html>
